<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:'Segoe UI',sans-serif;
    }

    body{
        background:linear-gradient(135deg,#0f172a,#1e293b);
        color:white;
        min-height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
    }

    .container{
        text-align:center;
        max-width:800px;
        padding:40px;
    }

    h1{
        font-size:3rem;
        margin-bottom:15px;
    }

    p{
        font-size:1.1rem;
        color:#cbd5e1;
        margin-bottom:30px;
    }

    .btn{
        display:inline-block;
        padding:15px 35px;
        background:#2563eb;
        color:white;
        text-decoration:none;
        border-radius:10px;
        font-size:18px;
        transition:.3s;
    }

    .btn:hover{
        background:#1d4ed8;
    }

    .features{
        margin-top:50px;
        display:grid;
        grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
        gap:20px;
    }

    .card{
        background:rgba(255,255,255,0.08);
        padding:20px;
        border-radius:15px;
        backdrop-filter:blur(10px);
    }

    .card h3{
        margin-bottom:10px;
    }
</style>
```

</head>

            <p>Generate weekly and monthly reports.</p>
        </div>

    </div>

</div>
